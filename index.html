<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MH LIVE ESPORTES</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay" class="hidden"></div>

  <header>
    <div class="logo">
      <img src="logo.jpeg" alt="Logo" class="logo-img" />
      <span>MH LIVE ESPORTES</span>
    </div>
    <button id="menu-btn" aria-label="Open menu" class="hamburger">&#9776;</button>
  </header>

  <aside id="sidebar" class="sidebar-closed" aria-hidden="true" role="navigation">
    <button id="close-btn" aria-label="Close menu" class="close-btn">&times;</button>
    <nav>
      <ul>
        <li><strong style="color:#fff3e0; font-size:1.3rem; margin-bottom:1.5rem; display:block; text-align:center;">Free Fire eSports</strong></li>
        <li><a href="#register-ff">Register Free Fire</a></li>
        <li><a href="#schedule">Schedule</a></li>
        <li><a href="#results">Match Results</a></li>
        <li><a href="#community">Community</a></li>
        <li><a href="#teams">Team List</a></li>
        <li><a href="#stream">Watch Stream</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </aside>

  <main>
    <section class="hero">
      <h1>Welcome </h1>
      <button class="register-btn">Register Now</button>
    </section>

    <section id="schedule" class="schedule-section">
      <h2>Upcoming Matches</h2>
      <table class="schedule-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Map</th>
            <th>Match Type</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Na-Na-Na</td>
            <td>Na</td>
            <td>Na</td>
            <td>Na</td>
          </tr>
          <tr>
            <td>Na-Na-Na</td>
            <td>Na</td>
            <td>Na</td>
            <td>Na</td>
          </tr>
          <tr>
            <td>Na-Na-Na</td>
            <td>Na</td>
            <td>Na</td>
            <td>Na</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
<div id="form-popup" class="form-popup hidden">
  <div class="form-popup-content">
    <button class="close-form-btn">&times;</button>
    <div id="jotform-container"></div>
  </div>
</div>
  <script src="script.js"></script>
</body>
</html>
